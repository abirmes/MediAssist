version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: mediassist_user
      POSTGRES_PASSWORD: mediassist_pass
      POSTGRES_DB: mediassist_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediassist_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
      - "8888:8888"
    environment:
      - DATABASE_URL=postgresql://mediassist_user:mediassist_pass@db:5432/mediassist_db
      - SECRET_KEY=${SECRET_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml/models:/app/ml/models
      - ./ml/data:/app/ml/data

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow && mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlartifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlartifacts

  # prometheus:
  #   image: prom/prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  postgres_data:
  mlflow_data: