global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  - job_name: "mediassist-backend"
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "backend:8000"